<!DOCTYPE html>
<html lang="nl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gespreksdoos App</title>

<script src="https://webgazer.cs.brown.edu/webgazer.js"></script>

<style>

body{
    font-family: Arial;
    text-align:center;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

h2{
    margin-bottom:20px;
}

.grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    padding:20px;
}

.card{
    width:160px;
    min-height:160px;
    border-radius:16px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    color:white;
    font-weight:bold;
    padding:10px;
    transition:0.3s;
    position:relative;
    text-align:center;
}

.answer{
    background:white;
    color:black;
}

.card.active-gaze,
.answer.active-gaze{
    transform:scale(1.08);
    box-shadow:0 0 25px rgba(255,255,0,0.9);
    border:6px solid yellow;
}

.timer{
    width:75%;
    height:10px;
    background:rgba(255,255,255,0.3);
    border-radius:10px;
    margin-top:12px;
    overflow:hidden;
}

.answer .timer{
    background:#ddd;
}

.timer-fill{
    width:0%;
    height:100%;
    background:yellow;
    transition:width 0.1s linear;
}

.answers{
    display:none;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-top:20px;
}

.back{
    margin-top:20px;
    font-size:20px;
    cursor:pointer;
    font-weight:bold;
}

.eyeButton{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#333;
    color:white;
    margin-bottom:20px;
}

</style>

</head>

<body>

<h2 id="title">Kies een vraag</h2>

<button class="eyeButton" onclick="startEyeTracking()">
👁️ Oogbesturing starten
</button>

<div id="questions" class="grid"></div>

<div id="answers" class="answers"></div>

<div class="back" onclick="goBack()">⬅ Terug</div>

<script>

function speak(text){

    speechSynthesis.cancel();

    const utterance = new SpeechSynthesisUtterance(text);

    utterance.lang = "nl-BE";

    utterance.rate = 0.9;

    speechSynthesis.speak(utterance);
}

const data = [

{
q:"Wanneer ben jij blij?",
color:"#4A90E2",
icon:"😊",
answers:[
{t:"vrienden",i:"👫"},
{t:"familie",i:"👨‍👩‍👧"},
{t:"buiten",i:"🌳"},
{t:"muziek",i:"🎵"},
{t:"tv",i:"📺"},
{t:"eten",i:"🍽️"},
{t:"cadeau",i:"🎁"},
{t:"knuffel",i:"🤗"}
]
},

{
q:"Wat maakt jou boos?",
color:"#4A90E2",
icon:"😡",
answers:[
{t:"ruzie",i:"⚡"},
{t:"lawaai",i:"🔊"},
{t:"wachten",i:"⏳"},
{t:"verlies",i:"❌"},
{t:"moe",i:"😴"},
{t:"honger",i:"🍽️"},
{t:"pijn",i:"🤕"},
{t:"drukte",i:"👥"}
]
},

{
q:"Wat eet jij graag?",
color:"#E94E4E",
icon:"🍕",
answers:[
{t:"pizza",i:"🍕"},
{t:"friet",i:"🍟"},
{t:"pasta",i:"🍝"},
{t:"brood",i:"🍞"},
{t:"soep",i:"🍲"},
{t:"fruit",i:"🍎"},
{t:"kip",i:"🍗"},
{t:"ijs",i:"🍦"}
]
},

{
q:"Wat doe jij graag buiten?",
color:"#4CAF50",
icon:"🌳",
answers:[
{t:"wandelen",i:"🚶"},
{t:"voetballen",i:"⚽"},
{t:"basketballen",i:"🏀"},
{t:"tuin werken",i:"🌱"},
{t:"dieren verzorgen",i:"🐄"},
{t:"fietsen",i:"🚲"},
{t:"rusten",i:"😌"},
{t:"praten",i:"💬"}
]
},

{
q:"Wat doe jij graag met vrienden?",
color:"#FF9800",
icon:"👫",
answers:[
{t:"praten",i:"💬"},
{t:"lachen",i:"😄"},
{t:"buiten spelen",i:"🌳"},
{t:"go-carten",i:"🏎️"},
{t:"uitgaan",i:"🎉"},
{t:"eten",i:"🍽️"},
{t:"gamen",i:"🎮"},
{t:"niets",i:"😐"}
]
},

{
q:"Wat is je favoriete dier?",
color:"#FF9800",
icon:"🐶",
answers:[
{t:"ezel",i:"🫏"},
{t:"koe",i:"🐄"},
{t:"varken",i:"🐷"},
{t:"geit",i:"🐐"},
{t:"kip",i:"🐔"},
{t:"eend",i:"🦆"},
{t:"draak",i:"🐉"},
{t:"hond",i:"🐶"}
]
}

];

const qDiv = document.getElementById("questions");
const aDiv = document.getElementById("answers");
const title = document.getElementById("title");

function loadQuestions(){

    qDiv.innerHTML = "";

    data.forEach((item,index)=>{

        const div = document.createElement("div");

        div.className = "card";

        div.style.background = item.color;

        div.innerHTML = `
            <div style="font-size:42px">${item.icon}</div>
            <div>${item.q}</div>

            <div class="timer">
                <div class="timer-fill"></div>
            </div>
        `;

        div.onclick = ()=>{

            speak(item.q);

            showAnswers(index);
        };

        qDiv.appendChild(div);

    });

}

function showAnswers(index){

    qDiv.style.display = "none";

    aDiv.style.display = "flex";

    const item = data[index];

    title.innerText = item.q;

    aDiv.innerHTML = "";

    item.answers.forEach(ans=>{

        const div = document.createElement("div");

        div.className = "card answer";

        div.innerHTML = `
            <div style="font-size:38px">${ans.i}</div>
            <div>${ans.t}</div>

            <div class="timer">
                <div class="timer-fill"></div>
            </div>
        `;

        div.onclick = ()=>{

            speak(ans.t);
        };

        aDiv.appendChild(div);

    });

}

function goBack(){

    speak("terug");

    qDiv.style.display = "flex";

    aDiv.style.display = "none";

    title.innerText = "Kies een vraag";
}

loadQuestions();

let currentElement = null;
let dwellTimeout = null;
let progressInterval = null;

function clearGaze(){

    clearTimeout(dwellTimeout);

    clearInterval(progressInterval);

    document.querySelectorAll(".card").forEach(el=>{

        el.classList.remove("active-gaze");

        const fill = el.querySelector(".timer-fill");

        if(fill){
            fill.style.width = "0%";
        }

    });

}

function startEyeTracking(){

    webgazer.setTracker("clmtrackr");

    webgazer.begin();

    webgazer.showPredictionPoints(true);

    webgazer.setGazeListener((data)=>{

        if(!data) return;

        const x = data.x;
        const y = data.y;

        const rawElement = document.elementFromPoint(x,y);

        const element = rawElement?.closest(".card");

        if(!element){

            clearGaze();

            currentElement = null;

            return;
        }

        if(currentElement !== element){

            clearGaze();

            currentElement = element;

            element.classList.add("active-gaze");

            const fill = element.querySelector(".timer-fill");

            let progress = 0;

            progressInterval = setInterval(()=>{

                progress += 5;

                if(fill){
                    fill.style.width = progress + "%";
                }

            },100);

            dwellTimeout = setTimeout(()=>{

                element.click();

            },2000);

        }

    });

    alert("Oogbesturing gestart 👁️");
}

</script>

</body>
</html>
