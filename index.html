<style>
body { font-family: Arial; text-align: center; background:#f5f5f5; }
.grid { display:flex; flex-wrap:wrap; justify-content:center; gap:15px; padding:20px; }
.card { width:160px; height:160px; border-radius:12px; display:flex; flex-direction:column; justify-content:center; align-items:center; cursor:pointer; color:white; font-weight:bold; padding:10px; transition:0.3s; }
.card.active-gaze {
  transform: scale(1.08);
  box-shadow: 0 0 25px rgba(255,255,255,0.9);
  border: 6px solid yellow;
}
.card .timer {
  width: 70%;
  height: 10px;
  background: rgba(255,255,255,0.3);
  border-radius: 10px;
  margin-top:10px;
  overflow:hidden;
}
.card .timer-fill {
  height:100%;
  width:0%;
  background:yellow;
}
.answer.active-gaze {
  transform: scale(1.08);
  box-shadow: 0 0 25px rgba(0,0,0,0.4);
  border: 6px solid orange;
}
.answer .timer {
  width: 80%;
  height: 10px;
  background: #ddd;
  border-radius: 10px;
  margin:10px auto 0;
  overflow:hidden;
}
.answer .timer-fill {
  height:100%;
  width:0%;
  background:orange;
}
.answers { display:none; flex-wrap:wrap; gap:10px; justify-content:center; margin-top:20px; }
.answer { background:white; border-radius:10px; padding:10px; width:120px; cursor:pointer; }
.back { margin-top:20px; cursor:pointer; font-size:18px; }
</style>

function startEyeTracking(){

  webgazer.setTracker("clmtrackr");

  webgazer.begin();

  webgazer.showPredictionPoints(true);

  webgazer.setGazeListener((data, elapsedTime) => {

    if (data == null) return;

    const x = data.x;
    const y = data.y;

    const element = document.elementFromPoint(x, y);

    if(element){

      document.querySelectorAll('.card, .answer').forEach(el=>{
        el.classList.remove('active-gaze');
      });

      if(
        element.classList.contains('card') ||
        element.classList.contains('answer')
      ){

        element.classList.add('active-gaze');

      }

    }

  });

  alert("Oogbesturing gestart 👁️");
}

function speak(text){
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'nl-NL';
  utterance.rate = 0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

const qDiv = document.getElementById("questions");
const aDiv = document.getElementById("answers");
const title = document.getElementById("title");

function loadQuestions(){
qDiv.innerHTML = "";
data.forEach((item, index)=>{
let div = document.createElement("div");
div.className = "card";
div.style.background = item.color;
div.innerHTML = `<div style="font-size:40px">${item.icon}</div><div>${item.q}</div><div class="timer"><div class="timer-fill"></div></div>`;

// spreek vraag bij klik
    div.onclick = ()=>{
      speak(item.q);
      showAnswers(index);
    };

qDiv.appendChild(div);
});
}

function showAnswers(index){
qDiv.style.display="none";
aDiv.style.display="flex";

let item = data[index];
title.innerText = item.q;

aDiv.innerHTML="";
item.answers.forEach(ans=>{
let div = document.createElement("div");
div.className="answer";
div.innerHTML = `<div style="font-size:30px">${ans.i}</div><div>${ans.t}</div><div class="timer"><div class="timer-fill"></div></div>`;

// spreek antwoord bij klik
      div.onclick = ()=> speak(ans.t);

  aDiv.appendChild(div);
});
}
