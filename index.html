<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gespreksdoos App</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        h2 { margin-bottom: 20px; }
        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            padding: 20px;
        }
        .card {
            width: 170px;
            min-height: 170px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: white;
            font-weight: bold;
            padding: 10px;
            transition: 0.3s;
            position: relative;
            text-align: center;
            user-select: none;
        }
        .answer {
            background: white;
            color: black;
        }
        .card.active-gaze, .answer.active-gaze {
            transform: scale(1.08);
            border: 6px solid yellow;
            box-shadow: 0 0 30px yellow;
        }
        .timer {
            width: 75%;
            height: 10px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            margin-top: 12px;
            overflow: hidden;
        }
        .answer .timer { background: #ddd; }
        .timer-fill {
            width: 0%;
            height: 100%;
            background: yellow;
            transition: width 0.1s linear;
        }
        .answers {
            display: none;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        .back {
            margin-top: 20px;
            font-size: 22px;
            cursor: pointer;
            font-weight: bold;
        }
        .eyeButton {
            padding: 15px 25px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: #333;
            color: white;
            margin-bottom: 20px;
        }
        .calibration-dot {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: red;
            position: fixed;
            z-index: 9999;
            pointer-events: none;
        }
        .status {
            margin: 10px 0;
            font-size: 16px;
            color: #666;
            min-height: 20px;
        }
        .error {
            color: #d32f2f;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2 id="title">Kies een vraag</h2>
    <button class="eyeButton" onclick="initWebGazer()">👁️ Oogbesturing starten</button>
    <div id="status" class="status"></div>
    <div id="questions" class="grid"></div>
    <div id="answers" class="answers"></div>
    <div class="back" onclick="goBack()">⬅ Terug</div>

    <!-- WebGazer script aan het EINDE van body voor betere lading -->
    <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>

    <script>
        // ===== DATA =====
        const data = [
            {
                q: "Wanneer ben jij blij?",
                color: "#4A90E2",
                icon: "😊",
                answers: [
                    {t:"vrienden", i:"👫"},
                    {t:"familie", i:"👨‍👩‍👧"},
                    {t:"muziek", i:"🎵"},
                    {t:"eten", i:"🍽️"}
                ]
            },
            {
                q: "Wat eet jij graag?",
                color: "#E94E4E",
                icon: "🍕",
                answers: [
                    {t:"pizza", i:"🍕"},
                    {t:"friet", i:"🍟"},
                    {t:"kip", i:"🍗"},
                    {t:"ijs", i:"🍦"}
                ]
            },
            {
                q: "Wat doe jij graag buiten?",
                color: "#4CAF50",
                icon: "🌳",
                answers: [
                    {t:"voetballen", i:"⚽"},
                    {t:"basketballen", i:"🏀"},
                    {t:"tuin werken", i:"🌱"},
                    {t:"dieren verzorgen", i:"🐄"}
                ]
            },
            {
                q: "Wat doe jij graag met vrienden?",
                color: "#FF9800",
                icon: "👫",
                answers: [
                    {t:"buiten spelen", i:"🌳"},
                    {t:"go-carten", i:"🏎️"},
                    {t:"uitgaan", i:"🎉"},
                    {t:"niets", i:"😐"}
                ]
            }
        ];

        // ===== DOM ELEMENTS =====
        const qDiv = document.getElementById("questions");
        const aDiv = document.getElementById("answers");
        const titleEl = document.getElementById("title");
        const statusEl = document.getElementById("status");

        // ===== GLOBALE VARIABELEN =====
        let currentElement = null;
        let dwellTimeout = null;
        let progressInterval = null;
        let isTracking = false;
        let webGazerReady = false;

        // ===== FUNCTIES =====
        function speak(text) {
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "nl-BE";
            utterance.rate = 0.9;
            speechSynthesis.speak(utterance);
        }

        function updateStatus(text, isError = false) {
            statusEl.textContent = text;
            statusEl.className = isError ? "status error" : "status";
        }

        function loadQuestions() {
            qDiv.innerHTML = "";
            data.forEach((item, index) => {
                const card = document.createElement("div");
                card.className = "card";
                card.style.background = item.color;
                card.innerHTML = `
                    <div style="font-size:42px">${item.icon}</div>
                    <div>${item.q}</div>
                    <div class="timer"><div class="timer-fill"></div></div>
                `;
                card.onclick = () => {
                    speak(item.q);
                    showAnswers(index);
                };
                qDiv.appendChild(card);
            });
        }

        function showAnswers(index) {
            qDiv.style.display = "none";
            aDiv.style.display = "flex";
            const item = data[index];
            titleEl.textContent = item.q;
            aDiv.innerHTML = "";
            item.answers.forEach(ans => {
                const card = document.createElement("div");
                card.className = "card answer";
                card.innerHTML = `
                    <div style="font-size:38px">${ans.i}</div>
                    <div>${ans.t}</div>
                    <div class="timer"><div class="timer-fill"></div></div>
                `;
                card.onclick = () => speak(ans.t);
                aDiv.appendChild(card);
            });
        }

        function goBack() {
            speak("terug");
            qDiv.style.display = "flex";
            aDiv.style.display = "none";
            titleEl.textContent = "Kies een vraag";
            clearGaze();
        }

        function clearGaze() {
            clearTimeout(dwellTimeout);
            clearInterval(progressInterval);
            document.querySelectorAll(".card").forEach(el => {
                el.classList.remove("active-gaze");
                const fill = el.querySelector(".timer-fill");
                if(fill) fill.style.width = "0%";
            });
            currentElement = null;
        }

        function startCalibration() {
            updateStatus("Kalibratie gestart. Kijk naar de rode bolletjes.");
            speak("Kalibratie start nu. Kijk naar de rode bolletjes.");

            webgazer.clearData();

            const points = [
                {x: 10, y: 10}, {x: 90, y: 10},
                {x: 50, y: 50},
                {x: 10, y: 90}, {x: 90, y: 90}
            ];

            let current = 0;
            let dot = null;

            function nextPoint() {
                if (current >= points.length) {
                    if (dot) dot.remove();
                    updateStatus("Kalibratie klaar! Oogbesturing actief.");
                    startEyeTracking();
                    return;
                }

                if (dot) dot.remove();

                const p = points[current];
                dot = document.createElement("div");
                dot.className = "calibration-dot";
                dot.style.left = `${p.x}%`;
                dot.style.top = `${p.y}%`;
                document.body.appendChild(dot);

                setTimeout(() => {
                    const rect = dot.getBoundingClientRect();
                    webgazer.recordScreenPosition(
                        rect.left + rect.width/2,
                        rect.top + rect.height/2
                    );
                    current++;
                    nextPoint();
                }, 1500);
            }

            nextPoint();
        }

        function startEyeTracking() {
            isTracking = true;
            speak("Oogbesturing is actief. Kijk 2 seconden naar een kaart om te selecteren.");

            webgazer.setGazeListener((data) => {
                if (!data || !isTracking) return;

                const x = data.x;
                const y = data.y;
                const element = document.elementFromPoint(x, y)?.closest(".card, .answer");

                if (!element) {
                    clearGaze();
                    return;
                }

                if (currentElement !== element) {
                    clearGaze();
                    currentElement = element;
                    element.classList.add("active-gaze");

                    const fill = element.querySelector(".timer-fill");
                    let progress = 0;
                    progressInterval = setInterval(() => {
                        progress += 5;
                        if (fill) fill.style.width = `${progress}%`;
                    }, 100);

                    dwellTimeout = setTimeout(() => {
                        element.click();
                        clearGaze();
                    }, 2000);
                }
            });
        }

        // ===== INITIALISATIE =====
        function initWebGazer() {
            if (webGazerReady) return;

            updateStatus("WebGazer initialiseren...");
            speak("Oogbesturing wordt gestart.");

            try {
                // Forceer WebGazer om te laden
                if (typeof webgazer === 'undefined') {
                    updateStatus("Fout: WebGazer script niet geladen. Controleer je internetverbinding.", true);
                    return;
                }

                // Wacht tot WebGazer klaar is
                const checkReady = setInterval(() => {
                    if (webgazer && webgazer.begin) {
                        clearInterval(checkReady);
                        webgazer.setRegression('ridge')
                               .setTracker('clmtrackr')
                               .begin()
                               .applyKalmanFilter(true);
                        webGazerReady = true;
                        startCalibration();
                    }
                }, 200);

                // Timeout na 8 seconden
                setTimeout(() => {
                    clearInterval(checkReady);
                    if (!webGazerReady) {
                        updateStatus("Fout: WebGazer laadt niet. Probeer de pagina te verversen of gebruik Chrome/Firefox.", true);
                        speak("Er is een probleem met de oogbesturing. Probeer het later nog eens.");
                    }
                }, 8000);

            } catch (e) {
                updateStatus(`Fout: ${e.message}`, true);
                console.error("WebGazer error:", e);
            }
        }

        // Laad kaartjes direct bij opstarten
        loadQuestions();
    </script>
</body>
</html>
