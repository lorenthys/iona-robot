<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Robot</title>

<style>
body{
margin:0;
background:linear-gradient(180deg,#020617,#0f172a);
color:white;
font-family:Arial;
text-align:center;
}

#robot{
font-size:150px;
margin-top:40px;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0px)}
}

#speech{
font-size:24px;
margin:20px;
min-height:60px;
padding:10px;
}

button{
font-size:20px;
padding:15px 25px;
margin:10px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

#game{
margin-top:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,80px);
gap:10px;
justify-content:center;
}

.card{
width:80px;
height:80px;
background:#334155;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
}

input{
font-size:20px;
padding:10px;
border-radius:10px;
border:none;
margin:10px;
width:120px;
text-align:center;
}

/* RESPONSIVE VOOR MOBIEL */
@media (max-width:600px){

#robot{
font-size:100px;
margin-top:20px;
}

#speech{
font-size:18px;
margin:15px;
}

button{
font-size:16px;
padding:12px 18px;
margin:6px;
}

.grid{
grid-template-columns:repeat(4,60px);
gap:8px;
}

.card{
width:60px;
height:60px;
font-size:24px;
}

input{
font-size:16px;
width:80px;
padding:8px;
}
}
</style>
</head>

<body>

<div id="robot">🤖</div>

<div id="speech">
Hallo! Ik ben jouw AI robot.
</div>

<button onclick="startListening()">🎤 Praat</button>
<br>

<button onclick="startQuiz()">Quiz</button>
<button onclick="showTime()">Tijd</button>
<button onclick="showWeather()">Weer</button>
<button onclick="startMemory()">Memory</button>
<button onclick="startNumberGame()">Raad het getal</button>

<div id="game"></div>

<script>

function speak(text){
document.getElementById("speech").innerText=text
let speech=new SpeechSynthesisUtterance(text)
speech.lang="nl-NL"
speechSynthesis.speak(speech)
}

/* TIJD */
function showTime(){
let now=new Date()
let time=now.getHours()+":"+now.getMinutes()
speak("Het is nu "+time)
}

/* WEER */
function showWeather(){
fetch("https://api.open-meteo.com/v1/forecast?latitude=51.22&longitude=4.40&current_weather=true")
.then(r=>r.json())
.then(data=>{
let temp=data.current_weather.temperature
speak("Het is momenteel "+temp+" graden buiten")
})
}

/* QUIZ */
let quizIndex=0
let score=0
let quizQuestions=[
{q:"Welke kleur heeft een banaan?",a:["Geel","Blauw","Paars"],correct:"Geel"},
{q:"Hoeveel poten heeft een hond?",a:["2","4","6"],correct:"4"},
{q:"Wat zegt een koe?",a:["Miauw","Boe","Woef"],correct:"Boe"},
{q:"Welke vorm is een bal?",a:["Vierkant","Rond","Driehoek"],correct:"Rond"},
{q:"Hoeveel ogen heeft een mens?",a:["1","2","3"],correct:"2"},
{q:"Wat drinkt een baby?",a:["Melk","Koffie","Cola"],correct:"Melk"},
{q:"Welke kleur heeft gras?",a:["Groen","Rood","Zwart"],correct:"Groen"},
{q:"Waar zwemmen vissen?",a:["Water","Lucht","Zand"],correct:"Water"},
{q:"Wat eet een konijn?",a:["Wortel","Pizza","Chips"],correct:"Wortel"},
{q:"Hoeveel dagen heeft een week?",a:["5","7","10"],correct:"7"}
]

function startQuiz(){
quizIndex=0
score=0
showQuestion()
}

function showQuestion(){
let q=quizQuestions[quizIndex]
document.getElementById("game").innerHTML=`
<h2>${q.q}</h2>
<button onclick="answer('${q.a[0]}')">${q.a[0]}</button>
<button onclick="answer('${q.a[1]}')">${q.a[1]}</button>
<button onclick="answer('${q.a[2]}')">${q.a[2]}</button>
`
}

function answer(a){
let correct=quizQuestions[quizIndex].correct
if(a==correct){score++; speak("Goed!");}else{speak("Dat is fout")}
quizIndex++
if(quizIndex<quizQuestions.length){setTimeout(showQuestion,1000)}
else{
document.getElementById("game").innerHTML="Quiz klaar! Score: "+score+" / 10"
speak("Quiz klaar! Je score is "+score)
}
}

/* MEMORY */
function startMemory(){
let symbols=[
"🐶","🐶","🍎","🍎","🚗","🚗","🐱","🐱","🍌","🍌",
"⚽","⚽","🐸","🐸","🍓","🍓","🚀","🚀","🌸","🌸"
]
symbols.sort(()=>Math.random()-0.5)

let first=null, second=null, lock=false

let grid=document.createElement("div")
grid.className="grid"

symbols.forEach(sym=>{
let card=document.createElement("div")
card.className="card"
card.dataset.symbol=sym
card.innerText=""

card.onclick=function(){
if(lock || card.innerText!="") return
card.innerText=sym
if(!first){first=card}else{
second=card
lock=true
if(first.dataset.symbol==second.dataset.symbol){
speak("Goed gevonden!")
first=null; second=null; lock=false
}else{
setTimeout(()=>{
first.innerText=""
second.innerText=""
first=null; second=null; lock=false
},900)
}
}
}

grid.appendChild(card)
})

document.getElementById("game").innerHTML=""
document.getElementById("game").appendChild(grid)
speak("Memory spel gestart")
}

/* RAAD HET GETAL */
let secretNumber
function startNumberGame(){
secretNumber=Math.floor(Math.random()*10)+1
document.getElementById("game").innerHTML=`
<h2>Raad een getal tussen 1 en 10</h2>
<input id="guess"><br>
<button onclick="checkGuess()">Raad</button>
`
speak("Raad een getal tussen 1 en 10")
}

function checkGuess(){
let guess=document.getElementById("guess").value
if(guess==secretNumber){
speak("Goed geraden!")
document.getElementById("game").innerHTML="Je hebt het geraden!"
}
else if(guess>secretNumber){speak("Het getal is lager")}
else{speak("Het getal is hoger")}
}

/* SPRAAKHERKENNING */
function startListening(){
let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition
let recognition = new SpeechRecognition()
recognition.lang="nl-NL"
recognition.start()
speak("Ik luister")
recognition.onresult=function(event){
let text=event.results[0][0].transcript.toLowerCase()
handleCommand(text)
}
}

function handleCommand(cmd){
if(cmd.includes("quiz")){startQuiz(); return}
if(cmd.includes("tijd")){showTime(); return}
if(cmd.includes("weer")){showWeather(); return}
if(cmd.includes("memory")){startMemory(); return}
if(cmd.includes("getal")){startNumberGame(); return}
speak("Dat begrijp ik nog niet")
}

speak("Hallo! Je kan quiz spelen, memory spelen of een getal raden.")

</script>

</body>
</html>
